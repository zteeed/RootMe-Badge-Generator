name: auto-merge

on:
  pull_request_target:
    branches:
      - master

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Auto-merge dependabot minor/patch updates
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          title="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title --jq '.title')"
          from="$(printf '%s\n' "$title" | sed -nE 's/^Bump .+ from v?([0-9]+)\.([0-9]+)\.([0-9]+).+ to v?([0-9]+)\.([0-9]+)\.([0-9]+).*$/\1.\2.\3/p')"
          to="$(printf '%s\n' "$title" | sed -nE 's/^Bump .+ from v?([0-9]+)\.([0-9]+)\.([0-9]+).+ to v?([0-9]+)\.([0-9]+)\.([0-9]+).*$/\4.\5.\6/p')"

          if [ -z "$from" ] || [ -z "$to" ]; then
            echo "Unable to parse semver bump from title: $title"
            echo "Skip auto-merge for safety."
            exit 0
          fi

          from_major="${from%%.*}"
          to_major="${to%%.*}"
          if [ "$from_major" != "$to_major" ]; then
            echo "Major update detected ($from -> $to). Skip auto-merge."
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --auto
