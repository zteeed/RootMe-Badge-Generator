name: Build & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:  # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#example-including-paths
      - "requirements.txt"
      - ".github/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set output
      run: echo "IMAGE_VERSION=${{ secrets.DOCKERHUB_USERNAME }}/rootme-badge-generator:$(date +%Y-%m-%d-%H-%M-%S)" >> $GITHUB_ENV
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        push: true
        tags: ${{ env.IMAGE_VERSION }}
    - name: Set artifact
      run: echo ${{ env.IMAGE_VERSION }} > version.txt
    - uses: actions/upload-artifact@v4
      with:
        name: image-version
        path: version.txt
  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: image-version
      - name: Compute image version
        run: >
          echo "IMAGE_VERSION=$(cat version.txt)" >> $GITHUB_ENV
      - name: Deploy rootme docker container
        env:
          ROOTME_IMAGE: ${{ env.IMAGE_VERSION }}
          ROOTME_STORAGE_PATH: /volume1/docker/rootme/storage_clients
          ROOTME_ACCOUNT_USERNAME: ${{ secrets.ROOTME_ACCOUNT_USERNAME }}
          ROOTME_ACCOUNT_PASSWORD: ${{ secrets.ROOTME_ACCOUNT_PASSWORD }}
        run: |
          docker compose up -d --pull always --no-build --force-recreate --remove-orphans
